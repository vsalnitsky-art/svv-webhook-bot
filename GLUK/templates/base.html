<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg">
    
    <title>{% block title %}AlgoBot{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc; --bg-sidebar: #ffffff; --bg-card: #ffffff; --bg-element: #f1f5f9;
            --border-subtle: #e2e8f0; --border-strong: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b;
            --accent: #4f46e5; --success: #059669; --danger: #dc2626;
            --sidebar-width: 260px; --sidebar-collapsed-width: 72px; --transition-speed: 0.3s;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 0.875rem; overflow-x: hidden; }
        
        #sidebar {
            width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle);
            position: fixed; top: 0; left: 0; height: 100vh; z-index: 1000;
            transition: width var(--transition-speed) ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-sm);
        }
        body.sidebar-collapsed #sidebar { width: var(--sidebar-collapsed-width); }
        .nav-label, .logo-text { opacity: 1; transition: opacity 0.1s ease; white-space: nowrap; }
        body.sidebar-collapsed .nav-label, body.sidebar-collapsed .logo-text { opacity: 0; pointer-events: none; display: none; }
        body.sidebar-collapsed .logo-icon { margin-right: 0 !important; font-size: 1.5rem; }
        body.sidebar-collapsed .sidebar-header { justify-content: center; padding-left: 0; padding-right: 0; }

        #content { margin-left: var(--sidebar-width); padding: 2rem; min-height: 100vh; transition: margin-left var(--transition-speed) ease; }
        body.sidebar-collapsed #content { margin-left: var(--sidebar-collapsed-width); }

        .nav-link {
            color: var(--text-muted); padding: 12px 20px; display: flex; align-items: center; border-left: 3px solid transparent;
            transition: all 0.2s; height: 48px; margin-bottom: 4px; font-weight: 500;
        }
        .nav-link:hover { color: var(--accent); background: var(--bg-element); }
        .nav-link.active { color: var(--accent); background: #eef2ff; border-left-color: var(--accent); }
        .nav-icon { font-size: 1.25rem; min-width: 24px; margin-right: 12px; display: flex; justify-content: center; }
        body.sidebar-collapsed .nav-link { justify-content: center; padding: 0; }
        body.sidebar-collapsed .nav-icon { margin-right: 0; }

        .card-custom { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
        .card-custom:hover { box-shadow: var(--shadow-md); }
        .font-mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
        .text-up { color: var(--success); } .text-down { color: var(--danger); }

        #sidebarToggle { cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        #sidebarToggle:hover { color: var(--text-main); background-color: var(--bg-element); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header d-flex align-items-center px-4 border-bottom" style="height: 70px; border-color: var(--border-subtle) !important;">
        <i class="ri-bit-coin-line text-accent logo-icon me-3 fs-3"></i>
        <div class="logo-text lh-1">
            <div class="fw-bold tracking-tight text-dark" style="font-size: 1.1rem;">ALGOBOT</div>
            <div class="small text-muted" style="font-size: 10px; letter-spacing: 1px;">PROFESSIONAL</div>
        </div>
    </div>

    <div class="py-4 flex-grow-1">
        <ul class="list-unstyled mb-0">
            <li><a href="/" class="nav-link {{ 'active' if request.path == '/' }}"><i class="ri-layout-grid-line nav-icon"></i><span class="nav-label">Огляд</span></a></li>
            
            <li class="px-3 pt-3 pb-2 small text-muted fw-bold text-uppercase nav-label" style="font-size: 0.7rem;">Торгівля</li>
            
            <li><a href="/scanner" class="nav-link {{ 'active' if '/scanner' in request.path }}"><i class="ri-pulse-line nav-icon"></i><span class="nav-label">Монітор Угод</span></a></li>
            <li><a href="/analyzer" class="nav-link {{ 'active' if '/analyzer' in request.path }}"><i class="ri-radar-line nav-icon"></i><span class="nav-label">Сканер Ринку</span></a></li>
            
            <li><a href="/smart_money" class="nav-link {{ 'active' if '/smart_money' in request.path }}"><i class="ri-eye-2-line nav-icon"></i><span class="nav-label">Smart Money</span></a></li>
            
            <li class="px-3 pt-3 pb-2 small text-muted fw-bold text-uppercase nav-label" style="font-size: 0.7rem;">Система</li>
            
            <li><a href="/ob_trend/settings" class="nav-link {{ 'active' if '/ob_trend' in request.path }}"><i class="ri-git-branch-line nav-icon"></i><span class="nav-label">Стратегія</span></a></li>
            <li><a href="/settings" class="nav-link {{ 'active' if '/settings' in request.path }}"><i class="ri-settings-line nav-icon"></i><span class="nav-label">Налаштування</span></a></li>
        </ul>
    </div>

    <div class="p-3 border-top" style="border-color: var(--border-subtle) !important;">
        <button id="sidebarToggle" class="btn w-100 d-flex align-items-center justify-content-center p-2 text-muted">
            <i class="ri-arrow-left-s-line fs-5" id="toggleIcon"></i>
            <span class="nav-label ms-2 small">Згорнути</span>
        </button>
    </div>
</nav>

<main id="content">
    {% block content %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const toggleIcon = document.getElementById('toggleIcon');
        const body = document.body;
        const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
        if (isCollapsed) {
            body.classList.add('sidebar-collapsed');
            toggleIcon.classList.replace('ri-arrow-left-s-line', 'ri-arrow-right-s-line');
        }
        toggleBtn.addEventListener('click', function() {
            body.classList.toggle('sidebar-collapsed');
            const collapsed = body.classList.contains('sidebar-collapsed');
            localStorage.setItem('sidebar-collapsed', collapsed);
            toggleIcon.classList.toggle('ri-arrow-left-s-line');
            toggleIcon.classList.toggle('ri-arrow-right-s-line');
        });
        [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]')).map(function (el) { return new bootstrap.Tooltip(el) });
    });
</script>
</body>
</html>
