{% extends "base.html" %}{% block title %}Dash{% endblock %}{% block content %}<div class="container-fluid"><h4 class="mb-4">Dashboard</h4><div class="row g-3 mb-4"><div class="col-md-3"><div class="card-custom p-3"><h6>Balance</h6><h3>{{balance}}</h3></div></div><div class="col-md-3"><div class="card-custom p-3"><h6>Active</h6><h3>{{active_count}}</h3></div></div><div class="col-md-3"><div class="card-custom p-3"><h6>P&L ({{days}}d)</h6><h3 class="{{'text-up' if period_pnl>0 else 'text-down'}}">{{period_pnl}}</h3></div></div></div><div class="card-custom"><div class="card-header bg-white">Recent Trades</div><table class="table mb-0">{% for t in trades %}<tr><td>{{t.symbol}}</td><td><span class="badge {{'bg-success' if t.side=='Long' else 'bg-danger'}}">{{t.side}}</span></td><td class="{{'text-up' if t.pnl>0 else 'text-down'}}">{{t.pnl}}</td><td>{{t.exit_time}}</td></tr>{% endfor %}</table></div></div>{% endblock %}
