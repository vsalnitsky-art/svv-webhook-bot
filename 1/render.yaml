services:
  - type: web
    name: svv-webhook-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # ✅ ИСПРАВЛЕНО: используем main_app.py с базой данных
    startCommand: gunicorn main_app:app
    envVars:
      - key: BYBIT_API_KEY
        value: 
      - key: BYBIT_API_SECRET  
        value:
      # Добавьте если хотите использовать Gemini AI:
      # - key: GEMINI_API_KEY
      #   value: your_gemini_api_key_here