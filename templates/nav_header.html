<!-- Navigation Header Component -->
<style>
    .nav-header {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 0;
        margin-bottom: 2rem;
    }
    
    .nav-top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
    }
    
    .nav-logo {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .nav-version {
        font-size: 0.7rem;
        color: var(--text-disabled);
        font-weight: normal;
        background: var(--bg-tertiary);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
    }
    
    .nav-quick-actions {
        display: flex;
        gap: 1rem;
        align-items: center;
    }
    
    .nav-quick-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .nav-quick-btn:hover {
        background: var(--bg-tertiary);
        border-color: var(--blue);
        color: var(--blue);
    }
    
    .nav-menu {
        display: flex;
        gap: 0;
        padding: 0 2rem;
    }
    
    .nav-item {
        padding: 1rem 1.5rem;
        color: var(--text-secondary);
        text-decoration: none;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .nav-item:hover {
        color: var(--text-primary);
        background: var(--bg-tertiary);
        border-bottom-color: var(--blue);
    }
    
    .nav-item.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
        background: var(--bg-tertiary);
    }
    
    .nav-badge {
        font-size: 0.7rem;
        background: var(--red);
        color: white;
        padding: 0.2rem 0.5rem;
        border-radius: 10px;
        font-weight: bold;
    }
    
    .nav-badge.success {
        background: var(--green);
    }
    
    .nav-badge.warning {
        background: var(--yellow);
        color: var(--bg-primary);
    }
</style>

<div class="nav-header">
    <!-- Top Bar -->
    <div class="nav-top-bar">
        <div class="nav-logo">
            🤖 SVV Сканер
            <span class="nav-version">v2.1</span>
        </div>
        
        <div class="nav-quick-actions">
            <a href="/parameters" class="nav-quick-btn">
                ⚙️ Налаштування
            </a>
            <a href="https://github.com/yourusername/svv-scanner" target="_blank" class="nav-quick-btn">
                📚 Документація
            </a>
        </div>
    </div>
    
    <!-- Main Navigation -->
    <div class="nav-menu">
        <a href="/scanner" class="nav-item {{ 'active' if request.path == '/scanner' else '' }}">
            📊 Позиції
            {% if active_positions_count > 0 %}
            <span class="nav-badge success">{{ active_positions_count }}</span>
            {% endif %}
        </a>
        
        <a href="/candidates" class="nav-item {{ 'active' if request.path == '/candidates' else '' }}">
            🎯 Кандидати
            {% if candidates_count > 0 %}
            <span class="nav-badge warning">{{ candidates_count }}</span>
            {% endif %}
        </a>
        
        <a href="/parameters" class="nav-item {{ 'active' if request.path == '/parameters' else '' }}">
            ⚙️ Налаштування
        </a>
    </div>
</div>
