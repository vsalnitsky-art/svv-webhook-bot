{% extends "base.html" %}

{% block title %}General Settings{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
    <h4 class="fw-bold mb-4">⚙️ Загальні Налаштування</h4>
    
    <form method="POST">
        
        <div class="card">
            <div class="card-header text-primary">🌍 Глобальні Параметри</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Валюта Торгівлі</label>
                        <select class="form-select" name="scanner_quote_coin">
                            <option value="USDT" {{ 'selected' if conf.get('scanner_quote_coin')=='USDT' }}>USDT</option>
                            <option value="USDC" {{ 'selected' if conf.get('scanner_quote_coin')=='USDC' }}>USDC</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Режим Сканера</label>
                        <select class="form-select" name="scanner_mode">
                            <option value="Manual" {{ 'selected' if conf.get('scanner_mode')=='Manual' }}>Manual (Кнопка)</option>
                            <option value="Auto" {{ 'selected' if conf.get('scanner_mode')=='Auto' }}>Auto (15 хв)</option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Глибина сканування (Топ монет)</label>
                        <input type="number" class="form-control" name="scan_limit" value="{{ conf.get('scan_limit') }}">
                        <div class="form-text">Максимальна кількість монет для аналізу за один раз (рекомендовано 100-200).</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header text-danger">💰 Ризик Менеджмент</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Ризик на угоду (%)</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control" name="riskPercent" value="{{ conf.get('riskPercent') }}">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Кредитне Плече (x)</label>
                        <div class="input-group">
                            <span class="input-group-text">x</span>
                            <input type="number" class="form-control" name="leverage" value="{{ conf.get('leverage') }}">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header" style="color: #0891b2;">✈️ Telegram Сповіщення</div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="telegram_enabled" {{ 'checked' if conf.get('telegram_enabled') }}>
                    <label class="form-check-label fw-bold">Увімкнути сповіщення</label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bot Token</label>
                    <input type="text" class="form-control" name="telegram_bot_token" value="{{ conf.get('telegram_bot_token','') }}" placeholder="123456:ABC...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Chat ID</label>
                    <input type="text" class="form-control" name="telegram_chat_id" value="{{ conf.get('telegram_chat_id','') }}" placeholder="-100...">
                </div>
            </div>
        </div>
        
        <div class="d-grid gap-2 mb-5">
            <button type="submit" class="btn btn-primary btn-lg">💾 Зберегти Зміни</button>
        </div>
    </form>
</div>
{% endblock %}
