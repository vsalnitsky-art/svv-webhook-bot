{% extends "base.html" %}

{% block title %}Налаштування{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 800px;">
    
    <div class="card-custom mb-4 border-0">
        <div class="card-body d-flex align-items-center justify-content-between">
            <div>
                <h5 class="fw-bold text-dark mb-1">Резервне копіювання</h5>
                <p class="text-muted small m-0">Експорт та імпорт конфігурації бота</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/settings/export" class="btn btn-outline-primary btn-sm">
                    <i class="ri-download-line me-1"></i> Експорт
                </a>
                <form action="/settings/import" method="POST" enctype="multipart/form-data" class="d-inline">
                    <label class="btn btn-primary btn-sm cursor-pointer">
                        <i class="ri-upload-line me-1"></i> Імпорт
                        <input type="file" name="file" accept=".json" hidden onchange="this.form.submit()">
                    </label>
                </form>
            </div>
        </div>
    </div>

    <form method="POST">
        <div class="card-custom mb-4 border-0">
            <div class="card-header bg-white border-bottom border-light py-3">
                <h6 class="fw-bold text-dark m-0">Глобальні Параметри</h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Валюта</label>
                        <select class="form-select" name="scanner_quote_coin">
                            <option value="USDT" {{ 'selected' if conf.get('scanner_quote_coin')=='USDT' }}>USDT</option>
                            <option value="USDC" {{ 'selected' if conf.get('scanner_quote_coin')=='USDC' }}>USDC</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Режим</label>
                        <select class="form-select" name="scanner_mode">
                            <option value="Manual" {{ 'selected' if conf.get('scanner_mode')=='Manual' }}>Ручний (Кнопка)</option>
                            <option value="Auto" {{ 'selected' if conf.get('scanner_mode')=='Auto' }}>Авто (Кожні 15хв)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-custom mb-4 border-0">
            <div class="card-header bg-white border-bottom border-light py-3">
                <h6 class="fw-bold text-danger m-0">Ризик Менеджмент</h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Ризик на угоду (%)</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control" name="riskPercent" value="{{ conf.get('riskPercent') }}">
                            <span class="input-group-text bg-light">%</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Плече (x)</label>
                        <input type="number" class="form-control" name="leverage" value="{{ conf.get('leverage') }}">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label small text-danger text-uppercase fw-bold">Stop Loss Mode</label>
                        <select class="form-select" name="sl_mode">
                            <option value="Fixed" {{ 'selected' if conf.get('sl_mode')=='Fixed' }}>Fixed %</option>
                            <option value="OB_Extremity" {{ 'selected' if conf.get('sl_mode')=='OB_Extremity' }}>Auto (OB Extremity)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">OB Buffer (%)</label>
                        <input type="number" step="0.01" class="form-control" name="obBufferPercent" value="{{ conf.get('obBufferPercent') }}">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label small text-success text-uppercase fw-bold">Take Profit Mode</label>
                        <select class="form-select" name="tp_mode">
                            <option value="None" {{ 'selected' if conf.get('tp_mode')=='None' }}>Вимкнено</option>
                            <option value="Fixed_1_50" {{ 'selected' if conf.get('tp_mode')=='Fixed_1_50' }}>Fixed 1% (50% Close)</option>
                            <option value="Ladder_3" {{ 'selected' if conf.get('tp_mode')=='Ladder_3' }}>Ladder (3 Targets)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-custom mb-4 border-0">
            <div class="card-header bg-white border-bottom border-light py-3">
                <h6 class="fw-bold text-info m-0">Telegram Сповіщення</h6>
            </div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="telegram_enabled" {{ 'checked' if conf.get('telegram_enabled') }}>
                    <label class="form-check-label fw-bold small text-muted text-uppercase">Активувати</label>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Bot Token</label>
                        <input type="text" class="form-control" name="telegram_bot_token" value="{{ conf.get('telegram_bot_token','') }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-muted text-uppercase fw-bold">Chat ID</label>
                        <input type="text" class="form-control" name="telegram_chat_id" value="{{ conf.get('telegram_chat_id','') }}">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mb-5">
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm fw-bold">Зберегти Налаштування</button>
        </div>
    </form>
</div>
{% endblock %}
