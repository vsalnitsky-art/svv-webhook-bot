{% extends "base.html" %}
{% block title %}Config{% endblock %}
{% block content %}
<div class="container-fluid" style="max-width:900px">
    <h4 class="mb-4">⚙️ Налаштування</h4>
    <form method="POST">
        <div class="card-custom mb-4 p-4">
            <h6 class="text-primary mb-3">⏳ Таймфрейми & Індикатори (Adaptive)</h6>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Глобальний Тренд (HTF)</label>
                    <select class="form-select" name="htfSelection" id="htfSelector" onchange="updateIndicators()">
                        <option value="15" {{'selected' if conf.get('htfSelection')|string=='15'}}>15m (Scalp)</option>
                        <option value="30" {{'selected' if conf.get('htfSelection')|string=='30'}}>30m</option>
                        <option value="45" {{'selected' if conf.get('htfSelection')|string=='45'}}>45m</option>
                        <option value="60" {{'selected' if conf.get('htfSelection')|string=='60'}}>1H (Intraday)</option>
                        <option value="240" {{'selected' if conf.get('htfSelection')|string=='240'}}>4H (Swing)</option>
                        <option value="D" {{'selected' if conf.get('htfSelection')|string=='D'}}>1D</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Вхід (LTF)</label>
                    <select class="form-select" name="ltfSelection">
                        <option value="5" {{'selected' if conf.get('ltfSelection')|string=='5'}}>5m</option>
                        <option value="15" {{'selected' if conf.get('ltfSelection')|string=='15'}}>15m</option>
                        <option value="45" {{'selected' if conf.get('ltfSelection')|string=='45'}}>45m</option>
                    </select>
                </div>
                <div class="col-12"><hr></div>
                <div class="col-md-3"><label>Cloud Fast</label><input type="number" class="form-control" id="cloudFast" name="obt_cloudFastLen" value="{{conf.get('obt_cloudFastLen')}}"></div>
                <div class="col-md-3"><label>Cloud Slow</label><input type="number" class="form-control" id="cloudSlow" name="obt_cloudSlowLen" value="{{conf.get('obt_cloudSlowLen')}}"></div>
                <div class="col-md-3"><label>OBV Len</label><input type="number" class="form-control" id="obvLen" name="obt_obvEntryLen" value="{{conf.get('obt_obvEntryLen')}}"></div>
                <div class="col-md-3"><label>Swing</label><input type="number" class="form-control" id="swingLen" name="obt_swingLength" value="{{conf.get('obt_swingLength')}}"></div>
                <div class="col-md-3"><label>RSI Buy</label><input type="number" class="form-control" id="entryRsiBuy" name="obt_entryRsiOversold" value="{{conf.get('obt_entryRsiOversold')}}"></div>
                <div class="col-md-3"><label>RSI Sell</label><input type="number" class="form-control" id="entryRsiSell" name="obt_entryRsiOverbought" value="{{conf.get('obt_entryRsiOverbought')}}"></div>
            </div>
        </div>

        <div class="card-custom mb-4 p-4">
            <div class="d-flex justify-content-between mb-3">
                <h6 class="text-danger m-0">🔴 Smart Exit Strategy</h6>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="exit_enableStrategy" id="exitSwitch" {{'checked' if conf.get('exit_enableStrategy')}}>
                    <label for="exitSwitch">Active</label>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-4"><label>RSI Exit Short (<)</label><input type="number" class="form-control" id="exitRsiShort" name="exit_rsiOversold" value="{{conf.get('exit_rsiOversold')}}"></div>
                <div class="col-md-4"><label>RSI Exit Long (>)</label><input type="number" class="form-control" id="exitRsiLong" name="exit_rsiOverbought" value="{{conf.get('exit_rsiOverbought')}}"></div>
                <div class="col-md-4"><label>OBV Exit Len</label><input type="number" class="form-control" id="exitObvLen" name="exit_obvLength" value="{{conf.get('exit_obvLength')}}"></div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Зберегти</button>
    </form>
</div>

<script>
const pM={
    '15':{cf:20,cs:60,ob:50,sw:10,rb:40,rs:60,exS:25,exL:75,exO:25},
    '30':{cf:15,cs:50,ob:40,sw:8,rb:40,rs:60,exS:25,exL:75,exO:20},
    '45':{cf:12,cs:45,ob:30,sw:7,rb:45,rs:55,exS:30,exL:70,exO:15},
    '60':{cf:10,cs:40,ob:20,sw:5,rb:45,rs:55,exS:30,exL:70,exO:12},
    '240':{cf:10,cs:40,ob:20,sw:5,rb:45,rs:55,exS:30,exL:70,exO:10},
    'D':{cf:10,cs:40,ob:20,sw:5,rb:45,rs:55,exS:30,exL:70,exO:10}
};
function updateIndicators(){const t=document.getElementById('htfSelector').value;const c=pM[t];if(c){ff('cloudFast',c.cf);ff('cloudSlow',c.cs);ff('obvLen',c.ob);ff('swingLen',c.sw);ff('entryRsiBuy',c.rb);ff('entryRsiSell',c.rs);ff('exitRsiShort',c.exS);ff('exitRsiLong',c.exL);ff('exitObvLen',c.exO);}}
function ff(id,v){const e=document.getElementById(id);if(e){e.style.backgroundColor='#d1fae5';e.value=v;setTimeout(()=>e.style.backgroundColor='white',300);}}
</script>
{% endblock %}
