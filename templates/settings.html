{% extends "base.html" %}

{% block title %}Загальні Налаштування{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
    <h4 class="fw-bold mb-4">⚙️ Загальні Налаштування</h4>
    
    <form method="POST">
        
        <div class="card mb-4">
            <div class="card-header text-primary fw-bold">🌍 Глобальні Параметри</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Валюта Торгівлі</label>
                        <select class="form-select" name="scanner_quote_coin">
                            <option value="USDT" {{ 'selected' if conf.get('scanner_quote_coin')=='USDT' }}>USDT</option>
                            <option value="USDC" {{ 'selected' if conf.get('scanner_quote_coin')=='USDC' }}>USDC</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Режим Сканера</label>
                        <select class="form-select" name="scanner_mode">
                            <option value="Manual" {{ 'selected' if conf.get('scanner_mode')=='Manual' }}>Manual (Кнопка)</option>
                            <option value="Auto" {{ 'selected' if conf.get('scanner_mode')=='Auto' }}>Auto (15 хв)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header text-danger fw-bold">💰 Ризик Менеджмент</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label d-flex align-items-center">
                            Ризик на угоду (%)
                            <i class="bi bi-info-circle help-icon" data-bs-toggle="tooltip" title="Відсоток від депозиту на одну угоду."></i>
                        </label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-control" name="riskPercent" value="{{ conf.get('riskPercent') }}">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label d-flex align-items-center">
                            Кредитне Плече (x)
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">x</span>
                            <input type="number" class="form-control" name="leverage" value="{{ conf.get('leverage') }}">
                        </div>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label d-flex align-items-center fw-bold">
                            Стратегія Take Profit
                            <i class="bi bi-info-circle help-icon" data-bs-toggle="tooltip" title="Оберіть, як бот буде фіксувати прибуток. 'Драбинка' ділить TP з сигналу на 3 частини."></i>
                        </label>
                        <select class="form-select" name="tp_mode">
                            <option value="None" {{ 'selected' if conf.get('tp_mode')=='None' }}>Вимкнено (Без TP)</option>
                            <option value="Fixed_1_50" {{ 'selected' if conf.get('tp_mode')=='Fixed_1_50' }}>Фіксований 1% (Закрити 50%)</option>
                            <option value="Ladder_3" {{ 'selected' if conf.get('tp_mode')=='Ladder_3' }}>Драбинка (3 цілі з сигналу)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header fw-bold" style="color: #0891b2;">✈️ Telegram Сповіщення</div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="telegram_enabled" {{ 'checked' if conf.get('telegram_enabled') }}>
                    <label class="form-check-label fw-bold">Увімкнути сповіщення</label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bot Token</label>
                    <input type="text" class="form-control" name="telegram_bot_token" value="{{ conf.get('telegram_bot_token','') }}" placeholder="123456:ABC...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Chat ID</label>
                    <input type="text" class="form-control" name="telegram_chat_id" value="{{ conf.get('telegram_chat_id','') }}" placeholder="-100...">
                </div>
            </div>
        </div>
        
        <div class="d-grid gap-2 mb-5">
            <button type="submit" class="btn btn-primary btn-lg shadow-sm">💾 Зберегти Зміни</button>
        </div>
    </form>
</div>
{% endblock %}
