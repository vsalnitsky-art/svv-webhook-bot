{% extends "base.html" %}

{% block title %}Strategy Settings{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">📊 Налаштування Стратегії</h4>
        <a href="/settings" class="btn btn-outline-secondary btn-sm">← Загальні</a>
    </div>

    <form method="POST">
        
        <div class="card">
            <div class="card-header text-success">🎛️ Логіка та Фільтри Входу</div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="form-check form-switch p-3 bg-light rounded h-100">
                            <input class="form-check-input" type="checkbox" name="useCloudFilter" {{ 'checked' if conf.get('useCloudFilter') }}>
                            <label class="form-check-label fw-bold">Cloud HMA</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch p-3 bg-light rounded h-100">
                            <input class="form-check-input" type="checkbox" name="useObvFilter" {{ 'checked' if conf.get('useObvFilter') }}>
                            <label class="form-check-label fw-bold">OBV Trend</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch p-3 bg-light rounded h-100">
                            <input class="form-check-input" type="checkbox" name="useRsiFilter" {{ 'checked' if conf.get('useRsiFilter') }}>
                            <label class="form-check-label fw-bold">RSI Logic</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch p-3 rounded h-100" style="background: #e0e7ff; border: 1px solid #4f46e5;">
                            <input class="form-check-input" type="checkbox" name="useOBRetest" {{ 'checked' if conf.get('useOBRetest') }}>
                            <label class="form-check-label fw-bold text-primary">OB Retest</label>
                            <div class="form-text small" style="font-size: 0.7rem;">Чекати дотику до зони</div>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Глобальний Тренд (HTF)</label>
                        <select class="form-select" name="htfSelection">
                            <option value="60" {{ 'selected' if conf.get('htfSelection')|string=='60' }}>1 Година (1H)</option>
                            <option value="240" {{ 'selected' if conf.get('htfSelection')|string=='240' }}>4 Години (4H)</option>
                            <option value="D" {{ 'selected' if conf.get('htfSelection')|string=='D' }}>1 День (1D)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Точка Входу (LTF)</label>
                        <select class="form-select" name="ltfSelection">
                            <option value="5" {{ 'selected' if conf.get('ltfSelection')|string=='5' }}>5 Хвилин (5m)</option>
                            <option value="15" {{ 'selected' if conf.get('ltfSelection')|string=='15' }}>15 Хвилин (15m)</option>
                            <option value="60" {{ 'selected' if conf.get('ltfSelection')|string=='60' }}>1 Година (1H)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header" style="color: #7c3aed;">📈 Параметри Індикаторів</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">RSI Length</label>
                        <input type="number" class="form-control" name="rsiLength" value="{{ conf.get('rsiLength') }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-success">RSI Buy (Oversold) &le;</label>
                        <input type="number" class="form-control" name="entryRsiOversold" value="{{ conf.get('entryRsiOversold') }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-danger">RSI Sell (Overbought) &ge;</label>
                        <input type="number" class="form-control" name="entryRsiOverbought" value="{{ conf.get('entryRsiOverbought') }}">
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label">Cloud Fast Length</label>
                        <input type="number" class="form-control" name="cloudFastLen" value="{{ conf.get('cloudFastLen') }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cloud Slow Length</label>
                        <input type="number" class="form-control" name="cloudSlowLen" value="{{ conf.get('cloudSlowLen') }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">OB Swing Length</label>
                        <input type="number" class="form-control" name="swingLength" value="{{ conf.get('swingLength') }}">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="d-grid gap-2 mb-5">
            <button type="submit" class="btn btn-success btn-lg">💾 Зберегти Стратегію</button>
        </div>
    </form>
</div>
{% endblock %}
