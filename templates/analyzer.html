{% extends "base.html" %}
{% block title %}Scanner{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card mb-4 shadow-sm border-0">
        <div class="card-header bg-white py-3"><h5 class="fw-bold mb-0">🚀 Параметри Сканування</h5></div>
        <div class="card-body bg-light">
            <form id="scan-form">
                <div class="row g-3 mb-4">
                    <div class="col-md-3"><label class="form-label fw-bold small text-muted">Trend TF</label><select class="form-select" name="htfSelection"><option value="60" {{ 'selected' if conf.get('htfSelection')|string=='60' }}>1H</option><option value="240" {{ 'selected' if conf.get('htfSelection')|string=='240' }}>4H</option></select></div>
                    <div class="col-md-3"><label class="form-label fw-bold small text-muted">Entry TF</label><select class="form-select" name="ltfSelection"><option value="5" {{ 'selected' if conf.get('ltfSelection')|string=='5' }}>5m</option><option value="15" {{ 'selected' if conf.get('ltfSelection')|string=='15' }}>15m</option></select></div>
                    <div class="col-md-3"><label class="form-label fw-bold small text-muted">Depth</label><input type="number" class="form-control" name="scan_limit" value="{{ conf.get('scan_limit', 100) }}"></div>
                    <div class="col-md-3"><label class="form-label fw-bold small text-muted">Mode</label><div class="form-check form-switch p-2 bg-white border rounded d-flex justify-content-between px-3"><label class="fw-bold text-primary m-0">OB Retest</label><input class="form-check-input m-0" type="checkbox" name="useOBRetest" {{ 'checked' if conf.get('obt_useOBRetest') }}></div></div>
                </div>
                <div class="row g-3">
                    <div class="col-md-4"><div class="form-check form-switch p-2 bg-white border rounded d-flex justify-content-between px-3"><label class="fw-bold m-0">Cloud</label><input class="form-check-input m-0" type="checkbox" name="useCloudFilter" {{ 'checked' if conf.get('obt_useCloudFilter') }}></div></div>
                    <div class="col-md-4"><div class="form-check form-switch p-2 bg-white border rounded d-flex justify-content-between px-3"><label class="fw-bold m-0">OBV</label><input class="form-check-input m-0" type="checkbox" name="useObvFilter" {{ 'checked' if conf.get('obt_useObvFilter') }}></div></div>
                    <div class="col-md-4"><div class="form-check form-switch p-2 bg-white border rounded d-flex justify-content-between px-3"><label class="fw-bold m-0">RSI</label><input class="form-check-input m-0" type="checkbox" name="useRsiFilter" {{ 'checked' if conf.get('obt_useRsiFilter') }}></div></div>
                </div>
                <div class="mt-4 text-end"><button type="button" id="btn-scan" class="btn btn-primary btn-lg w-100 shadow fw-bold" onclick="startScan()">SCAN 🚀</button></div>
            </form>
        </div>
    </div>
    </div>
<script>
function startScan() {
    $('#btn-scan').prop('disabled', true).text('Scanning...');
    var f={}; $('#scan-form').serializeArray().forEach(i=>f[i.name]=i.value);
    $('#scan-form input[type=checkbox]').each(function(){ f[this.name]=this.checked?'on':'off' });
    $.post('/analyzer/scan', f, function(){ location.reload() });
}
</script>
{% endblock %}
