<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AlgoBot{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --accent: #4f46e5;
            --success: #059669;
            --danger: #dc2626;
            --sidebar-width: 260px;
        }
        body {
            background: var(--bg-body);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
        }
        /* Sidebar Styling */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid #e2e8f0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
        }
        /* Content Area */
        #content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
        }
        /* Nav Links */
        .nav-link {
            color: #64748b;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--accent);
            background: #eef2ff;
            border-right: 3px solid var(--accent);
        }
        .nav-link i {
            font-size: 1.2rem;
        }
        /* Common Card Style */
        .card-custom {
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        /* Utilities */
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .text-up { color: var(--success); }
        .text-down { color: var(--danger); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <nav id="sidebar">
        <div class="d-flex align-items-center px-4 border-bottom" style="height: 70px;">
            <i class="ri-code-box-fill text-accent fs-3 me-3"></i>
            <span class="fw-bold fs-5 tracking-tight">ALGOBOT</span>
        </div>
        <div class="py-4">
            <ul class="list-unstyled">
                <li>
                    <a href="/" class="nav-link {{ 'active' if request.path == '/' }}">
                        <i class="ri-layout-grid-line me-3"></i> Огляд
                    </a>
                </li>
                <li>
                    <a href="/scanner" class="nav-link {{ 'active' if '/scanner' in request.path }}">
                        <i class="ri-pulse-line me-3"></i> Монітор
                    </a>
                </li>
                <li>
                    <a href="/analyzer" class="nav-link {{ 'active' if '/analyzer' in request.path }}">
                        <i class="ri-radar-line me-3"></i> Сканер
                    </a>
                </li>
                <li>
                    <a href="/smart_money" class="nav-link {{ 'active' if '/smart_money' in request.path }}">
                        <i class="ri-eye-2-line me-3"></i> Smart Money
                    </a>
                </li>
                <li>
                    <a href="/settings" class="nav-link {{ 'active' if '/settings' in request.path }}">
                        <i class="ri-settings-line me-3"></i> Налаштування
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main id="content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
