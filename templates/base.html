<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Bot{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg-body: #f3f4f6; --bg-card: #ffffff;
            --text-main: #111827; --text-muted: #6b7280;
            --success: #10b981; --danger: #ef4444;
        }
        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; color: var(--text-main); -webkit-font-smoothing: antialiased; font-size: 14px; }
        
        /* Navbar */
        .navbar { background: var(--bg-card); box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); padding: 0.75rem 1rem; margin-bottom: 1.5rem; }
        .navbar-brand { font-weight: 700; color: var(--primary) !important; letter-spacing: -0.025em; font-size: 1.25rem; }
        
        /* Cards */
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background: var(--bg-card); margin-bottom: 1.5rem; }
        .card-header { background: transparent; border-bottom: 1px solid #f3f4f6; padding: 1rem 1.5rem; font-weight: 600; color: var(--text-main); }
        .card-body { padding: 1.5rem; }
        
        /* Buttons */
        .btn { font-weight: 500; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.2s; font-size: 0.9rem; }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); border-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline-secondary:hover { background: #f9fafb; color: var(--text-main); border-color: #d1d5db; }
        
        /* Utils */
        .text-up { color: var(--success); font-weight: 600; }
        .text-down { color: var(--danger); font-weight: 600; }
        .badge { padding: 0.4em 0.8em; border-radius: 6px; font-weight: 600; }
        .badge-buy { background-color: #d1fae5; color: #065f46; }
        .badge-sell { background-color: #fee2e2; color: #991b1b; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🤖 AlgoBot Pro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="btn btn-sm btn-outline-secondary border-0" href="/scanner">🐋 Монітор</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-outline-secondary border-0" href="/analyzer">🚀 Сканер</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-outline-secondary border-0" href="/settings">⚙️ Налаштування</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-primary" href="/report">📊 Звіт</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
