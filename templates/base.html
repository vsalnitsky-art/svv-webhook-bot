<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AlgoBot{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
        }
        .navbar {
            background: #1a1f3a;
            padding: 0 20px;
            border-bottom: 1px solid #2a3550;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 0;
        }
        .navbar li {
            border-right: 1px solid #2a3550;
        }
        .navbar a, .navbar button {
            display: block;
            padding: 15px 20px;
            color: #e0e0e0;
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .navbar a:hover, .navbar button:hover {
            background: #2a3550;
            color: #4a9eff;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a href="/">📊 Overview</a></li>
            <li><a href="/ob_trend/settings">🐋 Strategy</a></li>
            <li><a href="#" onclick="alert('Coming soon')">📈 Analytics</a></li>
        </ul>
    </div>
    {% block content %}{% endblock %}
</body>
</html>
