<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AlgoBot Terminal{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Professional Zinc Palette */
            --bg-body: #09090b;       /* Майже чорний */
            --bg-sidebar: #18181b;    /* Zinc 900 */
            --bg-card: #18181b;       /* Zinc 900 */
            --bg-element: #27272a;    /* Zinc 800 */
            
            --border-subtle: #27272a; /* Zinc 800 */
            --border-strong: #3f3f46; /* Zinc 700 */
            
            --text-main: #e4e4e7;     /* Zinc 200 */
            --text-muted: #a1a1aa;    /* Zinc 400 */
            
            --accent: #6366f1;        /* Indigo */
            --success: #10b981;       /* Emerald */
            --danger: #ef4444;        /* Red */
            
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 72px;
            --transition-speed: 0.3s;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.875rem; /* 14px base */
            overflow-x: hidden;
        }

        /* --- SIDEBAR LOGIC --- */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 1000;
            transition: width var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Collapsed State */
        body.sidebar-collapsed #sidebar {
            width: var(--sidebar-collapsed-width);
        }

        /* Hiding text labels when collapsed */
        .nav-label, .sidebar-footer-text, .logo-text {
            opacity: 1;
            transition: opacity 0.1s ease;
            white-space: nowrap;
        }
        
        body.sidebar-collapsed .nav-label,
        body.sidebar-collapsed .sidebar-footer-text,
        body.sidebar-collapsed .logo-text {
            opacity: 0;
            pointer-events: none;
            display: none; /* Important for alignment */
        }
        
        body.sidebar-collapsed .logo-icon {
            margin-right: 0 !important;
            font-size: 1.5rem;
        }

        body.sidebar-collapsed .sidebar-header {
            justify-content: center;
            padding-left: 0;
            padding-right: 0;
        }

        /* --- CONTENT AREA --- */
        #content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            min-height: 100vh;
            transition: margin-left var(--transition-speed) ease;
        }

        body.sidebar-collapsed #content {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* --- NAVIGATION LINKS --- */
        .nav-link {
            color: var(--text-muted);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border-left: 2px solid transparent;
            transition: all 0.2s;
            height: 48px;
            margin-bottom: 4px;
        }

        .nav-link:hover {
            color: var(--text-main);
            background: var(--bg-element);
        }

        .nav-link.active {
            color: #fff;
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--accent);
        }

        .nav-icon {
            font-size: 1.25rem;
            min-width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        body.sidebar-collapsed .nav-link {
            justify-content: center;
            padding: 0;
        }
        
        body.sidebar-collapsed .nav-icon {
            margin-right: 0;
        }

        /* --- UI COMPONENTS --- */
        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 6px; /* Менш округлі, більш суворі */
        }
        
        .font-mono { 
            font-family: 'JetBrains Mono', monospace; 
            font-variant-numeric: tabular-nums; /* Рівні цифри в таблицях */
        }

        /* Toggle Button */
        #sidebarToggle {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        #sidebarToggle:hover { color: var(--text-main); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }

    </style>
    {% block head %}{% endblock %}
</head>
<body>

<nav id="sidebar">
    <div class="sidebar-header h-16 d-flex align-items-center px-4 py-4 border-bottom" style="border-color: var(--border-subtle) !important; height: 70px;">
        <i class="ri-terminal-box-fill text-accent logo-icon me-3 fs-4"></i>
        <div class="logo-text lh-1">
            <div class="fw-bold tracking-tight">ALGOBOT</div>
            <div class="small text-muted" style="font-size: 10px; letter-spacing: 1px;">TERMINAL</div>
        </div>
    </div>

    <div class="py-4 flex-grow-1">
        <ul class="list-unstyled mb-0">
            <li>
                <a href="/" class="nav-link {{ 'active' if request.path == '/' }}" title="Дашборд">
                    <i class="ri-dashboard-line nav-icon"></i>
                    <span class="nav-label">Overview</span>
                </a>
            </li>
            <li>
                <a href="/scanner" class="nav-link {{ 'active' if '/scanner' in request.path }}" title="Монітор">
                    <i class="ri-bar-chart-box-line nav-icon"></i>
                    <span class="nav-label">Positions</span>
                </a>
            </li>
            <li>
                <a href="/analyzer" class="nav-link {{ 'active' if '/analyzer' in request.path }}" title="Сканер">
                    <i class="ri-radar-line nav-icon"></i>
                    <span class="nav-label">Scanner</span>
                </a>
            </li>
            <li class="my-3 border-top" style="border-color: var(--border-subtle) !important;"></li>
            <li>
                <a href="/settings" class="nav-link {{ 'active' if '/settings' in request.path }}" title="Налаштування">
                    <i class="ri-equalizer-line nav-icon"></i>
                    <span class="nav-label">Settings</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="p-3 border-top" style="border-color: var(--border-subtle) !important;">
        <button id="sidebarToggle" class="btn w-100 d-flex align-items-center justify-content-center p-2 text-muted hover-bg-element">
            <i class="ri-arrow-left-s-line fs-5" id="toggleIcon"></i>
            <span class="nav-label ms-2 small">Collapse</span>
        </button>
    </div>
</nav>

<main id="content">
    {% block content %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const toggleIcon = document.getElementById('toggleIcon');
        const body = document.body;
        
        // 1. Check local storage for saved state
        const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
        if (isCollapsed) {
            body.classList.add('sidebar-collapsed');
            toggleIcon.classList.remove('ri-arrow-left-s-line');
            toggleIcon.classList.add('ri-arrow-right-s-line');
        }

        // 2. Toggle Logic
        toggleBtn.addEventListener('click', function() {
            body.classList.toggle('sidebar-collapsed');
            
            // Save state
            const collapsed = body.classList.contains('sidebar-collapsed');
            localStorage.setItem('sidebar-collapsed', collapsed);
            
            // Rotate icon
            if (collapsed) {
                toggleIcon.classList.remove('ri-arrow-left-s-line');
                toggleIcon.classList.add('ri-arrow-right-s-line');
            } else {
                toggleIcon.classList.remove('ri-arrow-right-s-line');
                toggleIcon.classList.add('ri-arrow-left-s-line');
            }
        });

        // Initialize tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (el) { return new bootstrap.Tooltip(el) })
    });
</script>

</body>
</html>
