{% extends "base.html" %}

{% block title %}OB Cloud Filters{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1">Фільтри Стратегії</h4>
            <p class="text-muted small m-0">Керування логічними блоками (ON/OFF).</p>
        </div>
        <a href="/analyzer" class="btn btn-outline-secondary btn-sm">Повернутися до Сканера</a>
    </div>

    <form method="POST">
        <div class="card-custom mb-4 p-4 border-0">
            <h6 class="fw-bold text-success mb-3">🎛️ Активні Фільтри</h6>
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="form-check form-switch p-3 border rounded bg-light h-100 d-flex align-items-center justify-content-between">
                        <label class="form-check-label fw-bold" for="swCloud">Cloud HMA Filter</label>
                        <input class="form-check-input ms-2" type="checkbox" id="swCloud" name="obt_useCloudFilter" {{ 'checked' if conf.get('obt_useCloudFilter') }}>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch p-3 border rounded bg-light h-100 d-flex align-items-center justify-content-between">
                        <label class="form-check-label fw-bold" for="swObv">OBV Trend Filter</label>
                        <input class="form-check-input ms-2" type="checkbox" id="swObv" name="obt_useObvFilter" {{ 'checked' if conf.get('obt_useObvFilter') }}>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch p-3 border rounded bg-light h-100 d-flex align-items-center justify-content-between">
                        <label class="form-check-label fw-bold" for="swRsi">RSI Logic Filter</label>
                        <input class="form-check-input ms-2" type="checkbox" id="swRsi" name="obt_useRsiFilter" {{ 'checked' if conf.get('obt_useRsiFilter') }}>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid mb-5">
            <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold">Застосувати Фільтри</button>
        </div>
    </form>
</div>
{% endblock %}
