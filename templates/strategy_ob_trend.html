{% extends "base.html" %}

{% block title %}OB Cloud Strategy{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1">Стратегія OB + Cloud</h4>
            <p class="text-muted small m-0">Order Blocks + Multi-Timeframe Trend</p>
        </div>
        <a href="/analyzer" class="btn btn-outline-secondary btn-sm">Повернутися до Сканера</a>
    </div>

    <form method="POST">
        
        <div class="card-custom mb-4 p-4 border-0">
            <h6 class="fw-bold text-success mb-3">🎛️ Активні Фільтри</h6>
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="form-check form-switch p-2 border rounded bg-light">
                        <input class="form-check-input ms-0 me-2" type="checkbox" name="obt_useCloudFilter" {{ 'checked' if conf.get('obt_useCloudFilter') }}>
                        <label class="form-check-label fw-bold">Cloud HMA Filter</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch p-2 border rounded bg-light">
                        <input class="form-check-input ms-0 me-2" type="checkbox" name="obt_useObvFilter" {{ 'checked' if conf.get('obt_useObvFilter') }}>
                        <label class="form-check-label fw-bold">OBV Trend Filter</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch p-2 border rounded bg-light">
                        <input class="form-check-input ms-0 me-2" type="checkbox" name="obt_useRsiFilter" {{ 'checked' if conf.get('obt_useRsiFilter') }}>
                        <label class="form-check-label fw-bold">RSI Logic Filter</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-custom mb-4 p-4 border-0">
            <h6 class="fw-bold text-info mb-3">📊 Smart Money Parameters</h6>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small text-muted fw-bold">Cloud Fast / Slow</label>
                    <div class="input-group">
                        <input type="number" class="form-control" name="obt_cloudFastLen" value="{{ conf.get('obt_cloudFastLen') }}">
                        <span class="input-group-text">/</span>
                        <input type="number" class="form-control" name="obt_cloudSlowLen" value="{{ conf.get('obt_cloudSlowLen') }}">
                    </div>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label small text-muted fw-bold">OB Swing Length</label>
                    <input type="number" class="form-control" name="obt_swingLength" value="{{ conf.get('obt_swingLength') }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-primary fw-bold">Volume Spike (x)</label>
                    <input type="number" step="0.1" class="form-control border-primary" name="obt_volumeSpikeThreshold" value="{{ conf.get('obt_volumeSpikeThreshold', 1.5) }}">
                    <div class="form-text" style="font-size: 0.65rem;">Коефіцієнт аномального об'єму</div>
                </div>
                
                <div class="col-12"><hr class="opacity-10 my-1"></div>

                <div class="col-md-4">
                    <label class="form-label small text-muted fw-bold">OBV Length</label>
                    <input type="number" class="form-control" name="obt_obvEntryLen" value="{{ conf.get('obt_obvEntryLen') }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-success fw-bold">RSI Buy (<=)</label>
                    <input type="number" class="form-control" name="obt_entryRsiOversold" value="{{ conf.get('obt_entryRsiOversold') }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small text-danger fw-bold">RSI Sell (>=)</label>
                    <input type="number" class="form-control" name="obt_entryRsiOverbought" value="{{ conf.get('obt_entryRsiOverbought') }}">
                </div>
            </div>
        </div>

        <div class="d-grid mb-5">
            <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold">Застосувати Зміни Стратегії</button>
        </div>
    </form>
</div>
{% endblock %}
