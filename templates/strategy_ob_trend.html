{% extends "base.html" %}{% block content %}<div class="container-fluid" style="max-width:600px"><h4>Filters</h4><form method="POST"><div class="card-custom p-3 mb-3"><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" name="obt_useCloudFilter" {{'checked' if conf.get('obt_useCloudFilter')}}><label>Cloud</label></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" name="obt_useObvFilter" {{'checked' if conf.get('obt_useObvFilter')}}><label>OBV</label></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" name="obt_useRsiFilter" {{'checked' if conf.get('obt_useRsiFilter')}}><label>RSI</label></div><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="obt_useOBRetest" {{'checked' if conf.get('obt_useOBRetest')}}><label>Retest</label></div></div><button class="btn btn-primary w-100">Save</button></form></div>{% endblock %}
